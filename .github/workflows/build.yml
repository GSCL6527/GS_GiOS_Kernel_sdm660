name: Build Kernel (Wayne with ReKSU)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        default: 'nightly'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install Build Tools
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev adb fastboot

    - name: Maximize Build Space & Force Swap
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell
        sudo swapoff /swapfile || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Download Toolchain (Proton Clang)
      run: |
        git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $GITHUB_WORKSPACE/clang

    - name: Manual ReKSU (ReSukiSU) Integration
      run: |
        # 1. 清除旧的残留，确保干净环境
        rm -rf drivers/kernelsu
        
        # 2. 克隆 ReSukiSU 源码（适配 4.19 内核的分支）
        mkdir -p drivers/kernelsu
        git clone https://github.com/ReSukiSU/ReSukiSU-KernelSU drivers/kernelsu --depth=1 -b 4.19
        
        # 3. 修改内核编译系统，确保 Kconfig 和 Makefile 能被正确引用
        # 移除可能存在的旧引用，避免重复
        sed -i '/kernelsu/d' drivers/Kconfig
        sed -i '/kernelsu/d' drivers/Makefile
        
        # 添加正确的引用
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        echo 'obj-y += kernelsu/' >> drivers/Makefile

        echo "ReKSU integration completed."

    - name: Build Kernel (In-Tree)
      id: build
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="GSCL6527"
        export KBUILD_BUILD_HOST="GitHub-Actions"

        MAKE_ARGS="CC=clang \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                   KCFLAGS=-Wno-error"

        make mrproper
        make vendor/wayne-oss-perf_defconfig $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"
        make -j$(nproc --all) $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)" || make -j1 $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"

        KERNEL_VER=$(make kernelversion 2>/dev/null | tail -1)
        echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV

    - name: Prepare AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        cp arch/arm64/boot/Image.gz-dtb AnyKernel3/

        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=ReKSU_Kernel_Wayne by GSCL6527
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=wayne
        device.name2=wayne_global
        device.name3=jasmine_sprout
        block=/dev/block/bootdevice/by-name/boot;
        is_slot_device=0;
        ramdisk_compression=auto;
        EOF

        rm -f *placeholder
        zip -r9 ../Kernel-Wayne-${{ env.KERNEL_VER }}-ReKSU.zip * -x .git README.md
        cd ..

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: Kernel Release ${{ github.event.inputs.release_tag }}
        body: |
          ### Compilation Info
          - **Kernel Version**: `${{ env.KERNEL_VER }}`
          - **Build Time**: `$(date -u +"%Y-%m-%d %H:%M:%S UTC")`
          - **Built-in**: ReKSU (ReSukiSU)
          - **Compiler**: Proton Clang
        files: Kernel-Wayne-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
