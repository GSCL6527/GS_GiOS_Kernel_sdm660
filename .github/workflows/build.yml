name: Build GSKernel wayne

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
        git zip libncurses5-dev device-tree-compiler gcc-aarch64-linux-gnu wget

    - name: Setup swap space
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Hotfix init/Kconfig (replace with known good version)
      run: |
        # 备份原文件
        cp init/Kconfig init/Kconfig.bak
        # 从 LineageOS 的 sdm660 内核仓库下载能正常工作的 Kconfig
        wget -O init/Kconfig https://raw.githubusercontent.com/LineageOS/android_kernel_xiaomi_sdm660/lineage-20/init/Kconfig
        echo "已替换 init/Kconfig 为官方可用版本"

    - name: Find and build with defconfig
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        # 你的 defconfig 路径
        DEFCONFIG=vendor/wayne-oss-perf_defconfig
        if [ ! -f "$DEFCONFIG" ]; then
          DEFCONFIG=arch/arm64/configs/vendor/wayne-oss-perf_defconfig
        fi
        
        echo "使用配置文件: $DEFCONFIG"
        make mrproper
        make $DEFCONFIG
        make -j$(nproc) Image.gz-dtb

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: |
          arch/arm64/boot/Image
          arch/arm64/boot/Image.gz
          arch/arm64/boot/Image.gz-dtb
