name: Build Kernel Wayne (ReKSU via wget - debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev adb fastboot wget unzip

    - name: Maximize build space and swap
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Download Proton Clang
      run: |
        git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $GITHUB_WORKSPACE/clang

    - name: Download and setup ReSukiSU (KernelSU replacement)
      run: |
        set -e  # 遇到错误立即退出
        echo "Current directory: $(pwd)"
        echo "Removing existing KernelSU..."
        rm -rf KernelSU
        
        echo "Downloading ReSukiSU 4.19 branch..."
        wget --verbose https://github.com/ReSukiSU/ReSukiSU-KernelSU/archive/refs/heads/4.19.zip -O /tmp/ReSukiSU-4.19.zip
        if [ ! -f /tmp/ReSukiSU-4.19.zip ]; then
          echo "ERROR: Download failed, file not found."
          exit 1
        fi
        ls -lh /tmp/ReSukiSU-4.19.zip
        
        echo "Unzipping..."
        unzip -q /tmp/ReSukiSU-4.19.zip -d /tmp
        if [ ! -d "/tmp/ReSukiSU-KernelSU-4.19" ]; then
          echo "ERROR: Unzip did not create expected directory. Contents of /tmp:"
          ls -la /tmp/
          exit 1
        fi
        
        echo "Moving to KernelSU directory..."
        mv /tmp/ReSukiSU-KernelSU-4.19 KernelSU
        rm /tmp/ReSukiSU-4.19.zip
        
        echo "Creating soft link drivers/kernelsu -> ../KernelSU/kernel"
        rm -rf drivers/kernelsu
        ln -sf ../KernelSU/kernel drivers/kernelsu
        
        echo "Ensuring Kconfig and Makefile references..."
        if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        fi
        if ! grep -q "kernelsu/" drivers/Makefile; then
          echo 'obj-y += kernelsu/' >> drivers/Makefile
        fi
        
        echo "ReSukiSU setup completed successfully."

    - name: Build kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="GSCL6527"
        export KBUILD_BUILD_HOST="GitHub-Actions"

        MAKE_ARGS="CC=clang \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                   KCFLAGS=-Wno-error"

        make mrproper
        make vendor/wayne-oss-perf_defconfig $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"
        make -j$(nproc --all) $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)" || make -j1 $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=ReKSU_Kernel_Wayne by GSCL6527
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=wayne
        device.name2=wayne_global
        device.name3=jasmine_sprout
        block=/dev/block/bootdevice/by-name/boot;
        is_slot_device=0;
        ramdisk_compression=auto;
        EOF
        rm -f *placeholder
        zip -r9 ../Kernel-Wayne-$(date +%Y%m%d)-ReKSU.zip *
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Wayne-ReKSU
        path: Kernel-Wayne-*.zip
