name: Build GSKernel wayne

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
        git zip libncurses5-dev device-tree-compiler gcc-aarch64-linux-gnu

    - name: Setup swap space
      run: |
        # 先关闭并删除已有的 swapfile（避免 Text file busy）
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Find and build with defconfig
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        # 根据你的仓库结构自动查找 defconfig（可根据实际情况修改）
        if [ -f "vendor/wayne-oss-perf_defconfig" ]; then
          DEFCONFIG=vendor/wayne-oss-perf_defconfig
        elif [ -f "arch/arm64/configs/vendor/wayne-oss-perf_defconfig" ]; then
          DEFCONFIG=arch/arm64/configs/vendor/wayne-oss-perf_defconfig
        else
          echo "::error::未找到 wayne-oss-perf_defconfig，请检查仓库路径"
          find . -name "*defconfig" | head -10
          exit 1
        fi
        
        echo "使用配置文件: $DEFCONFIG"
        make mrproper
        make $DEFCONFIG
        make -j$(nproc) Image.gz-dtb

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: |
          arch/arm64/boot/Image
          arch/arm64/boot/Image.gz
          arch/arm64/boot/Image.gz-dtb
