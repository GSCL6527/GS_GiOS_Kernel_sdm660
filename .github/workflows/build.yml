name: Build Kernel Wayne

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
        lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 \
        libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
        pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev adb fastboot

    - name: Setup swap space (avoid OOM)
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Download Clang toolchain (Proton Clang)
      run: |
        git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $HOME/kernel/toolchains
        echo "$HOME/kernel/toolchains/bin" >> $GITHUB_PATH

    - name: Set environment variables
      run: |
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV

    - name: Configure kernel (wayne-oss-perf_defconfig)
      run: |
        make O=out ARCH=arm64 CC=clang vendor/wayne-oss-perf_defconfig

    - name: Compile kernel
      run: |
        make O=out ARCH=arm64 CC=clang -j$(nproc)

    - name: Upload kernel images
      uses: actions/upload-artifact@v4
      with:
        name: kernel-wayne
        path: |
          out/arch/arm64/boot/Image
          out/arch/arm64/boot/Image.gz
          out/arch/arm64/boot/Image.gz-dtb
