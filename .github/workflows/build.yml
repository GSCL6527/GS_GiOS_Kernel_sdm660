name: Build GSKernel wayne (Ubuntu 20.04 - Force fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
        git zip libncurses5-dev device-tree-compiler gcc-aarch64-linux-gnu wget

    - name: Setup swap space
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Fix Kconfig issues
      run: |
        # 1. 删除 drivers/Kconfig 中对 kernelsu/Kconfig 的无效引用
        sed -i '/source.*kernelsu\/Kconfig/d' drivers/Kconfig 2>/dev/null || true

        # 2. 替换 init/Kconfig 为标准版本
        wget -q -O init/Kconfig https://raw.githubusercontent.com/torvalds/linux/v4.19/init/Kconfig
        echo "已下载标准 init/Kconfig，内容前30行："
        head -n 30 init/Kconfig

        # 3. 如果第16-17行仍然导致错误，直接删除这两行（可安全移除，因为通常是空行或注释行）
        sed -i '16,17d' init/Kconfig
        echo "已强制删除 init/Kconfig 的第16-17行"

        # 4. 重建 drivers/kernelsu 目录
        rm -rf drivers/kernelsu
        mkdir -p drivers/kernelsu
        touch drivers/kernelsu/Kconfig

    - name: Build kernel
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        DEFCONFIG=arch/arm64/configs/vendor/wayne-oss-perf_defconfig
        make mrproper
        make $DEFCONFIG
        make -j$(nproc) Image.gz-dtb

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: |
          arch/arm64/boot/Image
          arch/arm64/boot/Image.gz
          arch/arm64/boot/Image.gz-dtb
