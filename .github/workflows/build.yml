name: Build Kernel Wayne

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev adb fastboot

    - name: Maximize build space and swap
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Download Proton Clang
      run: |
        git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $GITHUB_WORKSPACE/clang

    - name: Clone ReSukiSU into KernelSU (as original symlink)
      run: |
        # 删除可能存在的 KernelSU 文件/链接/目录
        rm -rf KernelSU
        # 克隆整个 ReSukiSU 仓库（4.19 分支）
        git clone https://github.com/ReSukiSU/ReSukiSU-KernelSU.git --depth=1 -b 4.19 KernelSU
        # 创建 drivers/kernelsu 软链接指向 KernelSU/kernel
        rm -rf drivers/kernelsu
        ln -sf ../KernelSU/kernel drivers/kernelsu
        # 确保 drivers/Kconfig 中有 source 引用（如果原本有就不用重复添加，但为了安全，检查并添加）
        if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        fi
        # 确保 drivers/Makefile 中有 obj-y 引用
        if ! grep -q "kernelsu/" drivers/Makefile; then
          echo 'obj-y += kernelsu/' >> drivers/Makefile
        fi

    - name: Build kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="GSCL6527"
        export KBUILD_BUILD_HOST="GitHub-Actions"

        MAKE_ARGS="CC=clang \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                   KCFLAGS=-Wno-error"

        make mrproper
        make vendor/wayne-oss-perf_defconfig $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"
        make -j$(nproc --all) $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)" || make -j1 $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=ReKSU_Kernel_Wayne by GSCL6527
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=wayne
        device.name2=wayne_global
        device.name3=jasmine_sprout
        block=/dev/block/bootdevice/by-name/boot;
        is_slot_device=0;
        ramdisk_compression=auto;
        EOF
        rm -f *placeholder
        zip -r9 ../Kernel-Wayne-$(date +%Y%m%d)-ReKSU.zip *
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Wayne-ReKSU
        path: Kernel-Wayne-*.zip
