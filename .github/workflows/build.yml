name: Build Kernel Wayne with ReSukiSU (Main Repo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex \
        g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev \
        lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 \
        libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
        rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Download Proton Clang
      run: git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $GITHUB_WORKSPACE/clang

    - name: Setup ReSukiSU (Kernel module dir)
      run: |
        # 1. 清理旧的目录/软链接
        rm -rf KernelSU drivers/kernelsu

        # 2. 克隆 ReSukiSU 核心代码到 KernelSU 目录，使用你指定的提交 (9cca1f0)
        git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
        cd KernelSU
        git checkout 9cca1f097ce3b1dacbc7e181e93f7120ea2f1729
        cd ..

        # 3. 创建用于内核构建的软链接
        ln -sf $(pwd)/KernelSU/kernel $(pwd)/drivers/kernelsu

        # 4. 修改内核的 Kconfig 和 Makefile 以包含新模块
        #    检查并添加 source 行
        if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        fi
        #    检查并添加 obj-y 行
        if ! grep -q "kernelsu/" drivers/Makefile; then
          echo 'obj-y += kernelsu/' >> drivers/Makefile
        fi

    - name: Build Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64

        MAKE_ARGS="CC=clang \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                   KCFLAGS=-Wno-error"

        make mrproper
        make vendor/wayne-oss-perf_defconfig $MAKE_ARGS EXTRAVERSION="-ReKSU-$(date +%Y%m%d)"
        make -j$(nproc --all) $MAKE_ARGS

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=Wayne_ReKSU_Build
        do.devicecheck=1
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=wayne
        block=/dev/block/bootdevice/by-name/boot;
        is_slot_device=0;
        EOF
        rm -f *placeholder
        zip -r9 ../Kernel-Wayne-$(date +%Y%m%d)-ReKSU.zip *
        cd ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Wayne-ReKSU
        path: Kernel-Wayne-*.zip
