name: Build GSKernel wayne

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev \
        git zip libncurses5-dev device-tree-compiler gcc-aarch64-linux-gnu

    - name: Setup swap space
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Fix Kconfig errors
      run: |
        # 1. 删除 drivers/Kconfig 中不存在的 kernelsu 引用
        sed -i '/kernelsu\/Kconfig/d' drivers/Kconfig 2>/dev/null || true
        # 2. 修复 init/Kconfig 第16-17行可能存在的语法错误（注释掉报错行）
        sed -i '16s/^/#/' init/Kconfig
        sed -i '17s/^/#/' init/Kconfig
        # 3. 创建缺失的 Kconfig 占位文件（防止其他 source 错误）
        touch drivers/kernelsu/Kconfig 2>/dev/null || true

    - name: Build kernel
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        DEFCONFIG=arch/arm64/configs/vendor/wayne-oss-perf_defconfig
        make mrproper
        make $DEFCONFIG
        make -j$(nproc) Image.gz-dtb

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: |
          arch/arm64/boot/Image
          arch/arm64/boot/Image.gz
          arch/arm64/boot/Image.gz-dtb
